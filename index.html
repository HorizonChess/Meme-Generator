<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- is this correct?-->
    <title>Meme Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body onload="initCanvas(), resizeCanvas(), renderGallery()">

    <header class="main-header">
        <a class="logo" href="#">Meme-Generator</a>
        <nav class="main-nav">
            <button class="nav-link active" onclick="showView('gallery')">Gallery</button>
            <button class="nav-link">About</button>
            <button class="nav-toggle" aria-label="menu">&#9776;</button>
        </nav>
    </header>
<!-- gallery section -->
    <main>
        <section class="gallery-section view">
            <div class="gallery-container"></div>
        </section>

        <!-- editor section -->
        <section class="editor-section view hidden">
            <div class="editor-layout">
                <div class="editor-container">
                    <canvas class="meme-canvas"></canvas>
                </div>

                <div class="controls">
                    <div class="controls-lines">
                        <input type="text" class="text-input" placeholder="Enter text here"
                            oninput="onTextInputChange(event)">
                    </div>

                    <div class="controls-actions">
                        <button class="icon-btn switch-line" onclick="onSwitchLine()" title="Switch selected line">
                            <img src="resources/ICONS/up-and-down-opposite-double-arrows-side-by-side.png" alt="">
                        </button>
                        <button class="icon-btn add-line" onclick="onAddLine()" title="Add line">
                            <img src="resources/ICONS/add.png" alt="">
                        </button>
                    </div>

                    <div class="controls-side">
                        <button class="icon-btn font-decrease" onclick="onChangeFontSize(-2)"
                            title="Decrease font size">
                            <img src="resources/ICONS/decrease font - icon.png" alt="">
                        </button>
                        <button class="icon-btn font-increase" onclick="onChangeFontSize(2)" title="Increase font size">
                            <img src="resources/ICONS/increase font - icon.png" alt="">
                        </button>

                        <label class="icon-btn color-btn" title="Text color">
                            <img src="resources/icons/paint-board-and-brush.png" alt="">
                            <input type="color" class="color-picker" value="#ffffff"
                                onchange="onColorPickerChange(event)">
                        </label>
                    </div>

                    <a class="download-btn" href="#" onclick="onDownloadCanvas(this)">Download</a>
                </div>
            </div>
        </section>

    </main>

    <script src="js/services/meme-service.js"></script>
    <script src="js/meme-controller.js"></script>
    <script src="js/services/gallery-service.js"></script>
    <script src="js/gallery-controller.js"></script>
</body>

</html>
